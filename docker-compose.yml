# ---------------------------------------------------------------------------
# Backend stack: API + SQLite (no database server needed).
#   docker compose up --build
# Then open:  API/Swagger http://localhost:5000/swagger
# The SQLite database file lives on the `sqlite-data` volume so it survives
# container rebuilds/restarts.
# The React frontend lives in the separate `TaskManagementSystem.FrontEnd` repo
# and has its own Dockerfile/compose; point its VITE_API_URL at http://localhost:5000/api.
# Secrets default to dev values but can be overridden via a .env file (see .env.example).
# ---------------------------------------------------------------------------
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "Docker"
      ConnectionStrings__DefaultConnection: "Data Source=/data/taskmanager.db"
      Jwt__Key: "${JWT_KEY:-docker-compose-super-secret-jwt-signing-key-change-me-please}"
      Jwt__Issuer: "TaskManager.API"
      Jwt__Audience: "TaskManager.Client"
      Cors__AllowedOrigins__0: "http://localhost:3000"
      OpenAI__ApiKey: "${OPENAI_API_KEY:-}"
    ports:
      - "5000:8080"
    volumes:
      - sqlite-data:/data

volumes:
  sqlite-data:

# ---------------------------------------------------------------------------
# Local development helper: runs ONLY SQL Server in a container so you can run
# the API (dotnet run) and frontend (npm run dev) from your IDE against it.
#   docker compose -f docker-compose.local.yml up -d
# Connection string for the API:
#   Server=localhost,1433;Database=TaskManager;User Id=sa;Password=TaskManager2026!;TrustServerCertificate=True;Encrypt=False
# ---------------------------------------------------------------------------
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:-TaskManager2026!}"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data-local:/var/opt/mssql

volumes:
  mssql-data-local:
